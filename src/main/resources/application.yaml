spring:
  application:
    name: touchfy
  docker:
    compose:
      enabled: false
  datasource:
    url: jdbc:postgresql://postgres:5432/touchfy_db
    username: admin
    password: 123456
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  security:
    user:
      name: "admin"
      password: "{noop}senhateste"

logging:
  level:
    org.flywaydb: DEBUG