spring:
  application:
    name: touchfy
  docker:
    compose:
      enabled: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

jwt:
  access:
    expiration: 300000      # 5 minutos
  refresh:
    expiration: 604800000   # 7 dias

logging:
  level:
    org.flywaydb: INFO